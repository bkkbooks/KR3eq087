body:
  text: 卷下制方用藥必本升降浮沉之理易曰天道下濟而光明地道卑而上行故上下升降而氣乃和古人制方用藥一本升降浮沉之理不拘寒熱補瀉之迹者宋元以來東垣一人而已蓋四時之氣春升夏浮秋降冬沉而人身之氣莫不由之然升降浮沉者氣也其所以升降浮沉者人之中猶天之樞也今人飢飽勞役損傷中氣於是當升者不得升當降者不得降而發熱困倦喘促痞塞等症見矣夫內傷之熱非寒可清氣陷之痞非攻可去惟陰陽一通而寒熱自已上下一交而痞隔都損此東垣之學所以能為舉其大歟李頻湖曰升降浮沉則順之寒熱溫涼則逆之故春宜辛溫夏宜辛熱長夏宜甘苦辛溫秋宜酸溫冬宜苦寒愚謂升降浮沉則順之者所以順天時之氣也寒熱溫涼則逆之者所以救氣化之過也李氏辛甘酸苦之用是已若春宜溫夏宜熱冬宜寒之謂是助之也豈逆之謂哉五行問答客曰五行生剋之説非聖人之言也秦漢術士之所偽撰也余曰於何據也曰易言八卦而未及五行洪範言五行而未及生克是以知其為無據之言也曰子曷不觀諸河圖洛書乎河圖之數一六居下水也二七居上火也三八居左木也四九居右金也五十居中土也洛書之數戴九履一一水之生數也一之右七七火之成數也七之右為九九金之成數也九之右為三三木之成數也五居於中五土之成數也夫河圖逆而左旋以次相生洛書順而右轉以次相剋克者反順生者反逆此造化之妙也且河圖左旋相生而其對待則皆相剋洛書右轉相剋而其對待則皆相生是以生機恆寓於消落之中而生氣每藏於盛長之內生而無克則有進無退而氣易盡克而無生則消者不長而機以窮生也克也天地自然之理莫如其然而不得不然者也子又何疑焉曰河圖洛書古未必有此亦秦漢人所撰以神其説者乎曰易不云乎河出圖洛出書聖人則之何子之不察也且五行生剋天地之數也河圖洛書亦天地之數也未有圖書以前天地之數昭然已備即圖書至今不出而圖書之象昭然亦備圖書可假天地之數不可假也夏之暑肇於春之溫冬之寒始於秋之涼氣之默運然也一陽轉而土膏僭動天氣肅而海水西盛杲日出而霜露立消涼風至而萬木凋落象之顯呈也而又何疑於圖焉曰水生於天者也豈生於金乎方諸取水月為水母月亦生於金乎水生木未有木生於江湖波濤者水輔土以生木而專歸之水可乎曰天者乾之體也月者金之精也坤也者萬物皆致養焉五行皆不能離土而生獨木然也哉曰岱石出火漢井出煙是土生火也海中陰晦波如火燃是水生火也火熱而水乾是火反剋水也水沖而土潰是水反剋土也叢灶燎原火亦剋木鋤圊耜田金亦剋土生克之道不亦亂而無序乎曰河圖洛書水上火下木東金西天地之位前南後北左東右西其序秩然而不可紊亂者也其序秩然不可紊亂則其生其克亦循序旋轉而不可紊亂者也若深井有火高原出泉則二氣相更之妙耳火燃水乾水沖土潰則盛衰勝復之常耳是以窮五行之變則可以為是即五行之事則不可也且所謂相剋者不過制其太過而使歸於平非斬絶滅竭之謂也又以抑其浮盛而使還於根以為生髮之兆雖相剋而實相成也若金斫土掩火燃水沖此立盡之數豈足語造化生成之妙哉通一子雜論辨君火凝命於心為十二官稟命之生相火一位於命門一寄於三焦為十二經生氣之原由是神機不息而造化成焉此千古不易之道也而通一子之言總言大體則相火寄在命門析言職守則臟腑各有君相若然則二十官有十二君相矣五臟六腑將亂而自用心君不其守府乎曰凡以心之神肺之氣脾胃之倉廩肝膽之謀勇腎之伎巧變化皆發見之神奇使無君相何以能此不知心肺脾肝胃膽腎之能變化出入者皆稟心之君火以為主命門三焦之相火以為用猶庶司百職共稟大君之命而效成於下豈一臟有一君相之謂哉即爾謂臟腑各有相可矣而謂臟腑各有君可乎夫立言所以明道若此者求之太深出之反晦亦賢知之過也元氣是生來便有此氣漸長漸消為一生盛衰之本元精者與氣俱來亦漸長漸消而為元氣之偶元神者元氣元精之靈者也能變化往來而為精氣之主也景嶽謂無形之火神機是也亦曰元氣無形之水天癸是也又曰元精元精元氣即化生精氣之元神也以神為火以氣為神以精為無形以精氣為神所化語殊未瑩丹溪之治吞酸必以黃連為君而以吳茱萸佐之治心腹痛症謂宜倍用山梔而以炒乾薑佐之夫既謂其熱寒之可也何又並用如此余謂丹溪所治吞酸心腹痛並皆火熱鬱結之病火熱則宜清鬱結則宜散茱萸乾薑蓋資其散不資其熱也且既曰佐矣則所用無多自無掣肘矛盾之虞而有相助為理之益屢試屢驗不可廢也曰頭目口齒咽喉等症方書悉云風熱多以升降並用逆從兼施獨不慮升者礙降降者礙升乎從者礙逆逆者礙從乎以愚所見風熱交熾之症多有挾身中之陰火上從而為面赤足冷者古方之升降並用者所以散其外且以安其內也若升而無降則有躁煩厥逆之變降而無升則有瞀悶喘逆之憂不可不知也丹溪之所謂陽有餘陰不足者就血與氣言之也景嶽之所謂陽不足陰有餘者就神與形言之也形神切於攝養氣血切於治要各成一説而已矣痢之為病氣閉於下而火復迫之是以腹痛裡急糟粕不出而便腸垢也其源皆由於暑濕與瘧病俱發於夏秋蓋傷於經絡則成瘧而入於腸臟則為痢也經絡之邪可散而愈故治宜辛苦溫之藥腸臟之熱非清不愈故治宜辛苦寒之藥亦發表不遠熱攻裡不遠寒之意河間之主用清寒蓋亦有見於此景嶽不審痢病之所從來而以五臟五行為説謂惟心可言火其餘則均不可言火此但足資辨論而已豈足補於治要哉脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還因而復動名曰代陰也得此脈者必難治蓋結脈止而即還不失至數但少差池耳代脈止而不還越期乃還有此絶而彼來代之意此余之所親歷有如是者也而景嶽云凡見忽大忽小乍遲乍數更變不常者均謂之代似此倫亂舊法未足多也上下來去至止六字景嶽因滑氏之言而復傳其蘊而來去二義尤為精切曰風之與寒本為同氣但風邪淺而寒邪深淺屬陽而深屬陰耳此言最為明瞭今時皆合併病之名語詳則理確曰氣虛於中不能達表非補其氣肌能解乎血虛於裡不能化液非補其血汗能生乎又有火盛而水涸於經者譬如干鍋赤裂潤自何來但加以水則鬱蒸沛然而氣化四達又曰或發表或微解或溫散或涼散或補中托裡而為不散之散或補陰助陰或為云蒸雨化之散此公於發表一法獨能得其精奧故其言之盡而無敝確而可守如此口眼歪斜之病按仲景云絡脈空虛賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喎僻不遂及前賢針灸膏摩之法俱云左歪治右右歪治左以余所見凡手廢在左者則口眼歪於右廢在右者則口眼歪於左大法散邪養血往往獲愈若純施補則留連轉劇而景嶽乃云以藥治者左右皆宜從補以艾治者當從其急處而灸之余常謂景嶽之學得於推測者此類是也中風者風從外入天地之邪氣也類中風者風自內生肝臟之厥氣也肝之生氣暴而病速肝氣即厥諸氣從之諸液又從之諸氣化火諸液化痰輻湊上焦流溢經絡如風雨之驟至如潮汐之乍湧而不可擋也豈特如景嶽所謂氣血虛而已哉昔賢於此症或云火或云痰或云氣虛三者誠俱有之余惜其終屬模糊而未中肯綮也補下治下制以急大承氣之無甘草腎氣丸之有苓澤蓋謂此也左歸右歸二飲亦仿腎氣之意乃去澤瀉之咸而加甘草之甘既減下趨之勢更與緩中之權雖與之歸其可得乎哉補中益氣用耆術其意在求陽也故加升柴以引之補陰益氣用地藥其意在求陰也而亦用升柴是將之燕而越其指也或曰陰氣必資陽氣而後升則是附子桂心之任而非升柴之輕脫所得而與者已若謂陰虛而邪留者設則是古方柴胡四物之例以為補陰散邪則可以為補陰益氣則不可也柴胡等飲六方分溫涼脾胃血氣邪氣六法頗盡表法之變但不得以柴胡一味印定眼目學者善師其意可也景嶽五福飲於八物湯中去茯苓川芎之通芍藥之攝僅參朮歸地草五味則呆鈍不靈矣而云五臟俱補既無嚮導又失統御未足法也土具沖和之德而為生物之本沖和者不燥不濕不冷不熱乃能化生萬物是以濕土宜燥燥土宜潤使歸於平也熟地之補脾蓋補脾之陰耳若濕勝者非所宜也要知熟地入腎則補腎陰入脾則補脾陰景嶽乃謂地黃是太陽陽明之藥則泥而不通矣一陰二陰等煎蓋即天一地二諸數而明其方故五陰煎為補脾陰之劑方中不宜更雜白朮扁豆蓮肉蓋白朮燥脾濕扁豆蓮肉益脾氣而不能長脾陰也二陰煎即導赤散加麥冬棗仁元參黃連清潤之品殊覺有力喻氏春溫論辨喻氏論春溫以冬傷於寒春必病溫為一例以冬不藏精春必病溫為一例以既傷於寒又不藏精為一例愚按金匱云大邪中表小邪中里大邪漫風雖大而力微小邪戶牖隙風雖小而氣鋭以其鋭也故深入在裡以其小也故藏而不覺冬傷於寒者冬時所受之寒本自小而不大而又以不能蟄藏之故邪氣得以深伏於裡伏之既久寒變為熱至春人氣升浮邪氣與之俱出則發熱而渴是以冬傷於寒者春月溫病之由而冬不藏精者又冬時受寒之源耳嘉言所分三例其實不過一端而強為區畫辭愈煩而理愈晦矣寒毒藏於肌膚此叔和之謬説也喻氏亦云冬傷於寒藏於肌膚感春月之溫氣而始發肌膚陽明胃之所主也愚意肌膚非能藏之地陽明亦無受寒不發之理惟少陰為陰寒邪亦為陰以陰遇陰故得藏而不發是以傷寒之邪自太陽遞入三陰溫病之邪自少陰傳出三陽豈肌膚與胃之云乎哉喻氏云仲景治溫症凡用表藥皆以桂枝湯以示微發於不發之意又云溫病二三日間當用麻黃附子細辛湯麻黃附子甘草湯深入腎中領出外邪則重者愈矣此喻氏之臆説非仲景之舊章也蓋溫邪非發散可愈即有表症亦豈辛溫可發且桂枝湯為傷寒表病而里和者設溫症邪從里發而表且未病若用桂枝適足以助溫邪而留病氣又溫病伏寒變熱少陰之精已被劫奪更用辛附是絶其本而資之脫也即曰少陰本寒標熱邪入其界非溫不散然而溫病之發寒已變熱其欲出之勢有不待引之而自甚者其不能出者必皆陰精已涸者也不然寧有不出者耶喻氏強引經文傅會己意自誤誤人不容不辨喻氏云冬傷於寒者太陽膀胱主之冬不藏精者少陰腎經主之與兩感傷症中一日太陽受之即與少陰俱病則頭痛口乾煩渴而滿之例纖毫不差愚謂溫病有新舊合邪而無表裡兩感蓋溫病是伏氣所發少陰有伏氣太陽而亦能伏氣者未必然也不能伏則感而即發乃是傷寒而終非溫病矣喻氏云少陰為陰臟而少血所以強逼少陰汗者重則血從耳目口鼻出而厥竭可虞輕亦小便不利而枯涸可待余每用桂枝必加生地以匡芍藥之不逮功效歷歷可紀此論最善可以稍補前言之失蓋溫病之發陰氣先傷設有當行解散者必兼滋陰清熱之品參其間昔賢於蔥豉湯加童便梔豉湯中加生地麥冬亦此意也又曰今人見熱勝煩枯之症而不敢用附子者惡其以熱助熱也孰知不藏精之人腎中陽氣不鼓津液不得上升故枯燥外見才用附子助陽則陰精上交於陽位如釜底加薪則釜中之氣水上騰而潤澤有立至者數語亦有至理惟於溫病不能無弊蓋陰凝之枯燥與陰竭之枯燥霄壤懸殊萬一誤投死生立判不可不細審也柯氏傷寒論翼辨柯氏云仲景之書撰同素問皮部論云陽主外陰主內故仲景以三陽主外三陰主內又曰在陽者主內在陰者主出以滲於內故仲景又以陽明主內少陰亦有反發熱者故仲景於表劑中用附子是因其滲也又曰少陰之陰名曰樞儒其入於經也從陽部注於經其出者從陰內注於骨故仲景制麻黃附子湯治發熱脈沉無里症者是從陽部注經之意也製附子湯治身體骨節痛手足寒背惡寒脈沉者是從陰內注於骨之義也按內經所謂陽主外陰主內者是言陽明之陽以陽明為陽之闔故出則從陽而主外入則從陰而主內也所謂在陽者主內在陰者主外以滲於內者是言少陽之陽以少陽為樞為機之地故在陽者其用反從陰而主內在陰者其用反從陽而主出以滲於內滲於內如便液之屬蓋從內出外之意也少陰亦樞機之地故其入者反從陽而注於經其出者反從陰內注於骨也此皮部論之義柯氏似此援引未盡的確柯氏援地理兵法喻病邪之淺深方藥之大小可謂深切著明而於兵法又多精義非好為誇大者可比張千秋口陳烏桓兵事瞭如指掌非達識經事不能如此柯氏因陰陽十脈而立對待正看六法曲盡其變幾無遁形矣太陽膀胱之經起於足小趾循股上行至頭為三陽之表而寒邪傷人多自表入故太陽得先受邪有頭項強痛背疼等症而柯氏云心為太陽故得外統一身之氣血內行臟腑之經隧若膀胱位列下焦為州都之官所藏津液必待上焦之氣化而後出何能外司營衛為諸陽主氣哉又曰傷寒最多心病以心當太陽之位也心為君主寒為陰邪君火不足寒氣得以傷之所以名為大病按少陰心經起於手小指循臂上行入缺盆注心中今傷寒初病不聞有是經所生症者而邪入心經變不復見頭項強痛等症夫心以為太陽之位則不應無太陽之症以心為一身之主不得易膀胱之位況仲景所謂太陽者只就經脈而言自表邪傳經入里熱結膀胱乃始及於腑柯氏但知其位卑在下不得為都會之地而不思其經絡所過實為一身之表邪徇尊卑之名忘經野之實亦何取焉且傷寒雖曰大病未必便是死症若寒邪犯心水來剋火之説自是寒邪直入心臟之病而非大概傷寒在表之病矣必如其説則傷寒之病十無一生雖救療之不及而何有延至十數日之久哉且以心當太陽之位則太陽隨經入里之邪將直犯君主而何以仍歸膀胱為小便不利為結血不行炫新説而變舊章智者之過也道其不明矣夫膀胱有下口而無上口處大腸小腸交接之間即闌門也闌門者泌別水穀之處氣通命門人之水穀入胃以次傳入小腸斯時雖已熟腐而清濁猶未分也至於闌門而得命門之火薰蒸分布於是水液滲入膀胱糟粕下入大腸入大腸者以漸而下入膀胱者滿而後瀉柯氏乃謂膀胱有上口而無下口能入而不能出必待太陽氣化而溺始出非也果爾則胞中之水其滲已多而猶未溺之時更於何處可蓄耶且內經所謂氣化則能出者亦非太陽之氣化乃肺經之氣化也肺經之氣化則膀胱之氣亦化滿而後出虛而復受不然雖滿不能出也是以膀胱雖主津液而非命門之火蒸之則不能入非肺金之氣化則不能出不入則溏瀉之病生不出則癃閉之病作矣宣明人參白朮散方論宣明人參白朮散治遍身燥濕相搏玄府緻密遂致忪悸發渴飲食減少不為肌膚方以人參甘草甘以益虛也生地黃潤以滋燥石膏黃芩滑石寒以除熱也白朮茯苓燥以除濕也而意特在濕熱故白朮滑石石膏數獨多焉其用參地甘草者熱積則真氣消濕聚則堅燥生也尤妙在薄荷藿香以行表氣縮砂仁以行裡氣表裡氣通而後溫可行熱可去此畫龍點睛法也白朮湯方論與此略同學者宜究心焉柴胡梅連散羅氏秦艽鱉甲散方論風勞骨蒸久而咳嗽吐血脈來弦數者柴胡梅連散主之蓋邪氣既久積於表裡之間而不退非可一汗而去者故用柴胡之辛散必兼烏梅之酸收而久積之風內蘊骨髓者已變風之體而為熱則宜用胡黃連之苦寒以清之然兵無嚮導則不達賊境藥無引使則不通病所新病且然況伏邪乎故膽以合膽髓以合骨薤白之通陽童便之通怕而表裡肌骨之邪庶盡出歟羅氏秦艽鱉甲散與柴胡梅連同意亦治風勞骨蒸肌熱之症然減前胡之泄氣而加當歸之和血去黃連之苦寒而用青蒿之辛涼氣味為較和矣久病之人未必不宜緩法也補中益氣湯六味地黃湯方合論陽虛者氣多陷而不舉故補中益氣多用參耆朮草甘溫益氣而以升柴辛平助以上升陰虛者氣每上而不下故六味地黃丸多用熟地萸肉山藥味厚體重者補陰益精而以茯苓澤瀉之甘淡助之下降氣陷者多滯陳皮之辛所以和滯氣氣浮者多熱牡丹之寒所以清浮熱然六味之有苓澤猶補中之有升柴也補中之有陳皮猶六味之有丹皮也其參耆歸朮甘草猶地黃茱萸山藥也法雖不同而理可通也歸脾湯方論歸脾湯兼補心脾而意專治脾觀於甘溫補養藥中而加木香醒脾行氣可以見矣龍眼遠志雖曰補火實以培土蓋欲使心火下通脾土而脾益治五臟受氣以其所生也故曰歸脾鳳髓丹方論鳳髓丹為太陰濕熱下注少陰遺濁者設黃柏苦能燥濕寒能除熱故以為君濕熱易成壅滯砂仁之辛香可以利之脾邪不獨傷腎亦且自傷炙甘草之甘溫可以益之然諸治濕熱藥不用而獨取黃柏砂仁者以其氣味兼通少陰也小投杯湯方論上氣有熱者麻杏甘石湯無熱者小投杯湯蓋即麻杏甘石而以桂心易石膏同一通肺下氣而寒溫易用法斯備矣清暑益氣湯清燥湯合論清暑益氣湯蓋謂其人元氣本虛而又傷於暑濕脾得濕而不行肺得暑而不肅以致四肢倦怠精神短少懶於動作胸氣短促不思飲食脈浮緩而遲者設故用人參黃耆白朮甘草歸身甘溫氣味以補中益氣蒼朮黃柏澤瀉以除濕熱升麻葛根以除客熱而肺喜清肅得熱則煩故以麥冬五味清而收之脾喜疏通得濕則壅故以炒曲青皮陳皮溫而行之此正治脾肺氣虛而受暑濕若體實脈盛或雖虛而不甚及津涸煩渴多火者則不可混投也清燥湯亦治長夏濕熱蒸人氣體困倦腰足痿軟之症故比清暑益氣多黃連茯苓豬苓柴胡無澤瀉葛根青皮則清利之力差多疏滯之力差少是名清燥清以降逆燥以勝濕也方法餘論治外感必知邪氣之變態治內傷必知臟腑之情性治六淫之病如逐外寇攻其客毋傷及其主主弱則客不退矣治七情之病如撫亂民暴其罪必兼矜其情情失則亂不正矣營道者知其雄守其雌制方者知其奇守其正攻除陳積之藥可峻而不可駃宜專而不宜泛駃則急過病所泛則搏擊罕中由是堅壘如故而破殘已多豈徒無益而已哉母之與子氣本相通母旺則及其子子旺亦氣感於母故刪繁論云肝勞病者補心氣以益之餘臟皆然則不特虛則補其母一説已也陽與陰反然無陰則陽不見矣邪與正反然無正則邪不顯矣是以熱病飲沸湯而不知熱痿痹手足反無痛者陰盛而無與陽忤正衰而不與邪爭也如是者多不可治木火有相通之妙金水有相涵之益故不特木能生火而火亦生木不特金能生水而水亦生金水之生金如珠之在淵火之生木如花之含日
