body:
  text: 卷中風寒營衛之辨風為陽邪而上行衛為陽氣而主外以陽從陽其氣必浮故曰陽浮者熱自發陽得風而反強陰無邪而反弱以弱從強其氣必餒故曰陰弱者汗自出傷寒發熱者陽氣被鬱而不伸也中風發熱者陽氣被引而外浮也郁者必發之浮者不徒解散而已此桂枝湯所以兼陰陽通合散為劑也仲景衛強營弱之說不過發明所以發熱汗出之故後人不察遂有風並於衛衛實而營虛寒中於營營實而衛虛之辨不知邪氣之來自皮毛而至肌肉無論中風傷寒未有不及於衛者甚者乃並傷於營耳郭白雲所謂涉衛中營者是也衛病而營和則汗自出營與衛俱病則無汗矣無汗必發其汗麻黃湯所以去表實而發邪氣也有汗不可更發汗桂枝湯所以助表氣而逐邪氣也學者但分病證之有汗無汗以嚴麻黃桂枝之用不必執營衛之孰虛孰實以證傷寒中風之殊且無汗為表實何云衛虛麻黃之去實寧獨遺衛能不膠於俗說者斯為豪傑之士營衛本是和諧衛受邪而反強榮無邪而覺弱邪正不同強弱異等雖欲和諧不可得矣故曰營氣和者外不諧傷寒分立三綱桂枝主風傷衛麻黃主寒傷營大青龍主風寒兩傷營衛其說始於叔微許氏而成於中行方氏嘉言喻氏以愚觀之桂枝主風傷衛則是麻黃主寒傷營則非蓋有衛病而營不病者未有營病而衛不病者也至於大青龍證其立方之旨因煩躁而獨加石膏王文祿所謂風寒並重而閉熱於經故加石膏於發散藥中者是也若不過風寒併發則麻黃桂枝已足勝其任矣何必更須石膏哉寒邪閉皮毛而鬱陽氣是以發熱而汗不出麻黃杏仁開肺氣發腠理若桂枝甘草為辛甘發散之用也風邪不能外閉陽氣而反內擾陰氣是以其汗自出用芍藥者所以救其營也書謂風邪傷衛營未受病與芍藥以安營者尚隔一層寒邪六經俱受不必定自太陽傷寒傳經次第先太陽次陽明次少陽次太陰次少陰次厥陰此其常也然而風寒之邪亦有徑中陽明者仲景云陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊又少陽中風兩耳無所聞目赤胸中滿而煩者是也不獨陽明少陽為然即三陰亦有之云少陰病始得之反發熱脈沉者少陰初受寒邪之症也太陰中風四肢煩疼陽微陰澀而長者太陰初受風邪之症也厥陰中風脈微浮為欲愈不浮為未愈此厥陰初受風邪之脈也此三者又與三陰直中不同直中者病在臟此則病在經也是以六經皆能自受風寒何必盡從太陽傳入即從太陽傳入亦不必循經遞進海藏言之最詳茲不重述傷寒傳足不傳手者寒邪中人先著皮膚而足太陽膀胱之脈在最外一層故先入之稍深則去皮膚而入肌肉肌肉為足陽陰之分故次入之又稍深則在軀殼之內臟腑之外而足少陽之脈正當半表半裡之間故又次入之逮去表而之裡離陽而入陰則三陰者太陰為開厥陰為闔少陰為樞故邪氣入之先太陰次少陰次厥陰也合而言之陽主表而陰主裡表為腑而里五臟故邪氣在表則足三陽受之在裡則足三陰受之也手之三陽雖亦主表而太陽小腸少陽三焦陽明大腸並從手至於頭位偏而脈短不若足經之自下行上綱維一身也手之三陰雖亦主裡然太陰肺少陰心厥陰胞絡並處上焦不若肝脾腎之實居陰位也是故手三陽經雖陽而脈絀於表惟足三陽為獨主陽之表手三陰臟雖陰而位不處陰惟足三陰為獨主陰之裡傷寒之邪所以恆在足而不在手歟發明所謂傷寒止傷西北而不傷東南亦穿鑿之語夫邪氣侵淫自足及手者有之如玉機所謂足經實手經虛故能冤熱潔古所謂壬病傳丙丙病傳丁者是也然非汗下差誤或七情勞倦之故焉有傳及手經者哉陽結陰結脈浮而數能食不大便者名曰陽結十七日當劇脈沉而遲不能食身體重大便反硬名曰陰結十四日當劇蓋天人之氣十五日一更更則結者當解設不解其病則劇云十七日者陽結能食故過期十四日者陰結不能食故不及期也成氏過結再傳之說失之泥矣縱橫傷寒腹滿譫語寸口脈浮而緊此肝乘脾也名曰縱刺期門傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利此肝乘肺也名曰橫刺期門按腹滿譫語其脈當實沉而反浮緊此非裡實乃肝邪乘脾氣窒而實也發熱惡寒病為在表其證本不當渴而反大渴此非內熱乃肝邪乘肺氣鬱而燥也以里無熱不能消水故腹滿而汗出便利則肺氣已行故愈二者俱瀉肝邪則愈設不知而攻其實熱則誤矣此病機之變不可不審也戰栗邪氣入正氣抑則病正氣復邪氣退則汗出而愈矣然邪猶未強而未即服正猶微而未即勝此所以戰也邪氣外與正爭則為戰內與正爭則為栗栗者心內鼓栗經曰陰中於邪必內栗也若戰則但肢體戰搖而已戰者正氣勝則有得汗而解者栗者內氣虛不能御邪遂成厥脫也熱入血室熱入血室三條其旨不同第一條是血舍空而熱乃入者空則熱不得聚而遊其部故胸脅滿第二條是熱邪與血俱結於血室者血結亦能作寒熱柴胡亦能去血結不獨和解之謂矣第三條是熱邪入而結經尚行者經行則熱亦行而不得留故必自愈無犯胃氣及上二焦病在血而不在氣在下而不在上也若誅伐無過變證隨出烏能自愈耶圊血下利寸脈反浮數者陽之盛也尺中自澀者陰之虛也以陽加陰必圊膿血少陰熱在膀胱而便血者臟邪還腑血去熱出當愈強發少陰汗而動血者熱邪內迫血去陰竭多死吐利煩躁四逆少陰病吐利煩躁四逆者死為陰極而陽絶也少陰吐利手足厥冷煩躁欲死者吳茱萸湯主之為陰盛而陽爭也病症則同而辨之於爭與絶之間蓋亦微矣亡陽無陽亡陽陽不守也無陽陽之弱也陽亡者藩籬已徹故汗出不止陽弱者施化無權故不能作汗絶陽陽為津液之源津液為陽之根汗出過多胃氣生熱津液竭矣陽氣雖存根本則離故曰絶陽厥傷寒脈促手足厥逆者可灸之按本論云脈陽盛則促則手足厥逆而脈促者非陽之虛乃陽不通也灸之所以引陽外通若厥而脈微者則必更以四逆溫之病人手足厥冷脈乍緊者邪結在胸中胸中陽也陽實氣於四肢邪結胸中其陽不布則手足無氣而厥冷胸邪最高高者因而越之故曰當吐之宜瓜蒂散脈促者陽結不通故宜引其陽脈緊者陽為邪遏故須吐其邪二者皆與陽虛厥逆不同脈微而厥者陽之虛也宜四逆輩脈細而厥者血虛不營於四末也宜酸甘辛藥溫之潤之行之當歸四逆是也厥熱傷寒先厥者寒邪乍中陽氣暴折也後熱者陽氣漸復陰邪將卻也五日厥熱亦五日者陰勝陽復之常也厥深者熱亦深厥微者熱亦微謂有勝則有復勝之甚者其復亦甚非以外厥之微甚卜裡熱之淺深也傷寒前厥而後熱者其病多吉陽復而陰剝也前熱而後厥者其病多凶陰進而陽退也厥四日熱反三日即顯陽微之機不待復厥至五日而知其病之進也熱四日厥反三日即顯陰負之兆不待復熱至五日而知其病之必愈也三陰下症太陰有桂枝加大黃湯下之一症少陰有大承氣急下三症厥陰有小承氣下之一症夫邪入三陰病已深矣其幸而不死者其邪仍從陽而出耳張季明所謂太陰脾經溫燥不行亦當溫利自陽明出如桂枝加大黃是也少陰腎經雖用附子復使麻黃厥陰肝經用桂枝則知少陰亦自太陽出厥陰亦自少陽出及其太陽少陽鬱閉不行則當自陽明出故三陰皆有下症也桂枝湯風之為氣能動陽氣而泄津液所以發熱汗自出與傷寒之發熱無汗不同此用桂枝外發邪氣即以芍藥內安津液炙甘草合桂枝之辛足以攘外合芍藥之酸足以安內生薑大棗甘辛相合亦助正氣去邪之用蓋以肌解而邪不去故不用麻黃髮表而以桂枝助陽以為表以其汗出而營自和故不用石膏之清裡而用芍藥斂陰以為里此桂枝湯之所以大異於麻黃大青龍也麻黃湯寒邪傷人陽氣鬱而成熱皮膚閉而成實麻黃輕以去實辛以發陽氣溫以散寒氣杏仁佐麻黃通肺氣使腠理開泄王好古謂其為治衛實之藥者是也然泄而不收升而不降桂枝甘草雖以佐之實監製之耳東垣云麻黃湯是陽經衛藥也開腠理使陽氣申泄此藥為衛實也大小青龍湯大青龍治風寒外壅而閉熱於經者小青龍治風寒外壅而伏飲於內者夫熱鬱於經而不用石膏汗為熱隔寧有能發之者乎飲伏於內而不用薑夏邪與飲摶寧有能散之者乎其芍藥五味不特靖逆氣而安肺氣抑且制麻桂薑辛之勢使不相鶩而相就以成內外協濟之功也桂枝去芍藥加蜀漆龍骨牡蠣救逆湯傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之按此所謂陽者乃心之陽蓋即神也火氣通於心神被迫而不收與發汗亡陽者不同發汗者動其腎則厥逆筋惕肉瞤故當用四逆被火者傷其心則驚狂起臥不安故當用龍牡其去芍藥加蜀漆者蓋欲甘辛急復心陽而不須酸味更益營氣也與發汗後其人叉手自冒心心下悸欲得按者用桂枝甘草湯同蜀漆即常山苗味辛能去胸中邪結氣此症火氣內逼心包故須以逐邪而安正耳五苓豬苓五苓豬苓並治脈浮發熱渴而小便不利之症然五苓則加桂枝白朮而治太陽豬苓則加滑石阿膠而治陽明蓋太陽為開陽明為闔太陽為表之表其受邪也可以熱發可以辛散陽明為表之裡其氣難泄其熱易蓄其發散攻取自與太陽不同是以五苓散加甘辛溫藥假陽氣以行水豬苓湯加甘鹹寒藥假陰氣以利水也瀉心諸湯傷寒下後心下滿而不痛者為痞半夏瀉心湯主之蓋客邪內陷既不可從汗泄而痞不實又不可從下奪故惟半夏乾薑之辛能散其結芩連之苦能泄其滿熱其所以泄散者雖藥之能而實胃氣之使也此用人參甘草者非以下後中傷故以益氣而助其能耶甘草瀉心生薑瀉心雖同為治痞之劑而生薑瀉心意在胃中不和故加辛溫以和胃甘草瀉心意在下利不止與客氣上逆故不欲人參之增氣而須甘草之安中也大黃黃連瀉心腸治傷寒汗下後心下痞按之濡其脈關上浮者成氏云此虛熱也與大黃黃連以導其虛熱按成氏所謂虛熱者對燥屎而言也蓋邪熱入里與糟粕相結則為實熱不與糟粕相結則為虛熱非陰虛陽虛之謂本方以大黃黃連為劑而不用枳朴等藥者蓋以泄熱非以蕩實熱也白通四逆白通四逆俱用薑附俱為扶陽抑陰之劑而白通意在通陽故用蔥白凡厥而下利脈微者用之四逆意在救里故用甘草凡厥而清穀不止者用之若通脈四逆則進而從陽以收外散之熱白通加人尿豬膽汁則退而就陰以去格拒之寒也麻杏甘石湯汗出而喘無大熱者其邪不在經腠而在肺中故非桂枝所能發麻杏辛甘入肺散邪氣肺被邪鬱而生熱石膏辛寒入肺除熱氣甘草甘溫安中氣且以助其散邪清熱之用乃肺臟邪氣發喘之的劑也飲證類傷寒傷寒若吐若下後心下逆滿氣上衝胸云云按此非傷寒症乃屬飲家也金匱云膈間支飲其人喘滿心下痞堅得之數十日醫吐下之不愈木防己湯主義又云其人振振身瞤動者必有伏飲又云心下有痰飲胸脅支滿目眩是也成氏以為裡虛氣逆與此藥和經益陽散氣恐未切當病如桂枝症頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散寒謂寒飲非寒邪也此亦痰飲類傷寒症活人書云痰飲之為病能令人增寒發熱狀類傷寒但頭不痛項不強為異耳簡誤汗多則熱愈汗少則便難疑是汗少則熱愈汗多則便難太陽篇云脈陽微而汗出少者為自和也汗出多者為太過陽脈實因發其汗出多者為亦太過太過為陽絶於里亡津液大便因硬也成氏謂汗少則邪熱不盡又走其津液者非太陽病十日已去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯謂脈但浮而不細嗜臥者邪猶在外宜麻黃湯脈浮細不嗜臥而胸滿脅痛者邪又在少陽宜小柴胡湯非外已解而又和之發之之謂也太陽病脈浮緊無汗發熱身疼痛八九日不解表症仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之按麻黃湯主之句當在此當發其汗下謂服麻黃湯已病雖未除而又發煩目瞑劇者陽邪上盛必將衄血而後解非既衄血而又以麻黃湯發之也然亦須審微甚而處之若其欲衄而血不流雖衄而邪不解者則仍宜發汗仲景云傷寒脈浮緊不發汗因致衄者麻黃湯主之是也傷寒脈浮滑此表有熱里有寒白虎湯主之按陽明篇云傷寒無大熱口燥渴心煩背微惡寒者白虎湯主之厥陰篇云傷寒脈滑而厥者里有熱也白虎湯主之審此本文當作里有熱表有寒表寒即手足厥背惡寒之謂蓋傳寫之誤不必曲為之解也症象陽旦一條蓋即前條之意而設為問答中間語意殊無倫次豈後人之文耶昔人讀考工記謂不類於周官余於此條亦云下利清穀汗出必脹滿者傷其陽而氣不行成氏謂亡津液者非也寒實結胸無熱證者與三物小陷胸湯白散亦可服當作寒實結胸無熱證者與三物白散舊本必有誤也既已寒實何可更用栝蔞黃連寒藥耶傷寒雜論太陽病初服桂枝湯而反煩者陽邪痹於陽而不散也故先刺風池風府以通其痹陽邪被抑而未服者仍當從陽因而去之此桂枝湯去芍藥之意病在陽而反下之邪氣被抑而未復正氣方虛而不振是以其脈多促然當辨其仍在表者則純以辛甘發之桂枝去芍藥湯是也辨其兼入里者則並以苦寒清之葛根黃芩黃連湯是也余寇未平復合為亂餘邪未淨復集為病傷寒發汗解半日許復煩是也大下之下之後復發汗三條均是汗下之後然小便不利者傷其陰也振寒脈微細者陰陽俱傷也晝日煩躁不得臥者傷陽而不傷陰也於此見病變之不同發汗則動經者無邪可發而反動其經氣也余謂此條為飲症者未必謬也發汗後水藥不得入口者是動其經氣也但陽脈微者先汗之而解但陰脈微者下之而解逐堅攻瑕之法喘而汗出有陽氣虛脫者亦有熱氣內迫者太陽病下之下利脈促喘而汗出葛根黃連黃芩湯主之是也利水逐血為熱入膀胱兩大法門利水分清溫五苓豬苓是也逐血辨微甚桃仁承氣抵當湯丸是也青龍湯主散表寒而兼清裡熱故麻黃多於石膏麻杏甘石主清肺熱而兼散肺邪故石膏多於麻黃桂枝湯主散表邪故桂枝倍芍藥而益生薑之辛建中湯主立中氣故芍藥倍桂枝而益飴糖之甘品味相同而君臣異用表裡補泄因之各異矣太陽轉入陽明其端有二一者汗出不徹邪氣不服而傳曰太陽初得病時發其汗汗先出不徹因轉屬陽明也一者汗出過多胃中乾燥而傳曰太陽病若發汗若吐若下若利小便此亡津液胃中乾燥因轉屬陽明也經邪不能聚故傳入腑則聚而不傳經邪未變故惡寒入腑則變熱而不寒曰陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明入腑症也陽明病法多汗反無汗其身如蟲行皮中狀者氣內蒸而津不從也痞症表未解者宜先解表不可便治其痞若兼下利不止者則不拘此例宜合表裡而並治太陽病外症未除而數下之遂協熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之是也陽明津涸舌乾口燥者不足慮也若並亡其陽則殆矣少陰陽虛汗出而厥者不足慮也若並傷其陰則危矣是以陽明燥渴能飲冷者生不能飲者死少陰厥逆舌不幹者生乾者死少陰病八九日一身手足盡熱者邪自本而之標自臟而入腑也雖便血可治
