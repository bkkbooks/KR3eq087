body:
  text: 續記寸口分診臟腑定位脾與胃合肝與膽合腎與膀胱合皆足經也其臟腑皆相依附則其診候亦應同在一部如左關候肝膽右關候脾胃左尺候腎與膀胱是已肺與大腸合心與小腸合心包絡與三焦合皆手經也其臟腑不相依附則其診候亦不必同在一部按內經云尺外以候腎尺裡以候腹又云前以候前後以候後上竟上者胸喉中事是以大腸當候於右尺之裡小腸當候於左尺之裡三焦分立上中下三部如此則左心小腸右肺大腸之謬可不辨而自著矣古方權量古方湯液分兩大者每劑二十餘兩小有十餘兩用水六七升或一斗煮取二三升或五六升並分三服一日服盡為劑似乎太重後世學者未敢遵式按陳無擇三因方云漢銅錢質如周錢文曰半兩則漢方當用半兩錢二枚為一兩且以朮附湯方校若用漢兩計一百八十銖得開元錢二十二個半重若分三服則是今之七錢半重一服此說最有根據千金以古三兩為今一兩古三升為今一升仍病其多不如陳說為是火齊湯倉公治病恆用火齊湯而其方不傳劉宗厚云即古方黃連解毒湯是未知何據按倉公用治齊郎中令之湧疝中熱不得前溲齊王太后之風癉熱客脬難於大小便溺赤則亦清寒徹熱之劑也夫蟯瘕蟯瘕為病腹大上黃膚粗循之慼慼然上黃面黃也蓋即今人蟲蠱之病腹大面黃而肌膚粗澀者也蔥豉湯肘後云傷寒有數種庸人卒不能分別今取一藥兼療者用蔥白一虎口豉一升水煮頓服汗出即愈按本草淡豉治傷寒時疾熱病發汗元素云蔥莖白通上下陽氣合而用之故能通治數種傷寒然其方亦有數變一加葛根三兩一加升麻三兩若不汗更加麻黃三兩助之散也一加米三合益氣以出汗也一加童便三升汗出於陽而生於陰火多者宜之也深師又加烏梅十四枚葛根半斤兼治煩滿也聖濟總錄加人參萎蕤羚羊角治勞風項強急痛四肢煩熱千金加梔子黃連黃柏大黃各半兩一加生地石膏各八兩生葛四兩為表裡證治之別以意斟酌投之輒驗誠良方也枳實梔子豉湯仲景治大病瘥後勞復者枳實梔子豉湯主之廣劑加蔥白粟米雄鼠糞範汪加桂枝大黃麻黃又方去梔豉加甘草桂心大黃芒硝千金加石膏鼠糞崔氏單加鼠糞一味古今錄驗加麻黃大黃一加鼠糞大黃一去梔豉加鼠糞一加鼠糞麻黃一去梔子加甘草大黃芒硝許仁則又加蔥白生薑乾葛麥冬生地或主表或主裡或兼主表裡或兼養或兼滋或表裡與滋養兼施凡十餘變而梔豉之法盡矣鹹寒熱淫於內治以鹹寒內經之旨也仲景療傷寒加芒硝於苦寒藥中文仲又加芒硝於甘寒藥中其方以生麥冬一升生地黃一升知母二兩生薑二兩半芒硝二兩半水煮分五服取利為度由是而鹹寒之用乃廣矣酸苦湧泄院河南治天行熱解毒多用苦酒豬膽生艾汁苦參青葙葶藶之屬外臺單用苦參一兩酒煮並服取吐如烊膠便愈張文仲療傷寒溫病等三日以上胸中滿用苦酒半升豬膽一枚和服取吐蓋即內經酸苦湧泄之義然今人之用此者罕矣五疰鬼氣五疰鬼氣之病或助正氣以闢之如蘇合香丸之屬是也或假鬼氣以引之如死人枕天靈蓋之屬是也徐嗣伯劉大用恆用此法而嗣伯云鬼氣伏而不起故令人沉滯得死人枕促之魂氣飛越不得攸附體故屍疰可瘥劉氏治婦人因人入廟為邪鬼所憑致精采蕩越與死人枕煎湯飲之大瀉數行而愈則是死人之枕引鬼氣或從上越或從下出隨其攸利與草木氣味升降浮沉各具一體性者不同今人亦罕有聞用之者矣千金療屍疰方發灰杏仁熬令紫色等分搗如泥以豬膏和酒服如桐子三丸日三神良愚謂此治血枯經絡澀閉成勞者之良方也亦即百勞䗪蟲之意而氣味和調可以無弊或以桃仁易杏仁亦得瘧瘧之病熱氣舍於營寒氣居於衛寒居於衛則束其營之熱不得外越熱舍於營則阻其衛之寒不得內乘氣相抑而適相持是以傷寒易變而瘧病不遷也瘧邪不能自發必得人之正氣而後發故曰衛氣之所在與邪氣相合則病作瘧邪外不在皮膚內不在臟腑是以汗之而不從外泄下之而不從里出也風氣常在瘧有時而休常在者其氣舒蓄而作者其氣暴故工不能治其已發也瘧發已而邪遞淺者其作日蚤發已而復伏愈深者其作日晏日蚤者易已日晏者難已其始晏而終蚤者邪氣下行極而之上也是以瘧病欲愈一日反二三發其邪愈淺輒與衛氣相簿故也瘧之為病邪正分爭往來不已有戰之義也治之必先助其正氣或急去其邪氣蓋正旺則邪自解邪去則正亦安也今有人體虛患瘧不數日而作漸晏勢漸衰神氣反昏而不可救非正虛而邪陷之故歟陰陽交陰陽交之病古有其名而無能抉其義者愚謂交非交通之謂乃錯亂之謂也陰陽錯亂而不可復理攻其陰則陽捍之不得入攻其陽則陰持之不得通故曰交者死也郭白雲所謂即是兩感之病蓋從汗出而熱不退處悟入然兩感究竟是陰陽齊病而非陰陽交病是以與先表后里或表裡並治之法以其未嘗混合為一也崩中下血婦人崩中下血多因濕熱傷脾胃而致蓋脾統血傷則失守也醫者不知其脾濕而但與固脫之劑血雖止而濕轉郁矣是以崩中之後多成脹滿黃病醫多不能識此耳聾治肺鼻塞治心古云耳聾治肺肺主聲鼻塞治心心主臭愚謂耳聾治肺者自是肺經風熱痰涎閉郁之症肺之絡會於耳中其氣不通故令耳聾故宜治其肺使氣行則聾愈夫聲從外入非無聲也有聲而不能入也而謂肺主聲何哉其鼻塞治心者經云心肺有病而鼻為之不利治心者蓋以利鼻豈曰致臭哉噎膈反胃之辨噎膈反胃自是二病世醫每連稱而並舉之者丹溪實作之俑也丹溪曰其槁在上近咽之下水飲可行食物難入入亦不多名之曰噎其槁在下與胃為近食雖可入良久復出名之曰膈亦曰反胃是以噎膈分上下二病而以反胃屬之膈殊欠分明愚謂噎膈之所以反胃者以食噎不下故反而上出若不噎則並不反矣其反胃之病則全不噎食或遲或速自然吐出與膈病何相干哉二者病本不同治法亦異不可不辨瀉痢不同痢與泄瀉其病不同其治亦異泄瀉多起寒濕寒則宜溫濕則宜燥也痢病多成濕熱熱則宜清濕則宜得也雖泄瀉亦有熱症然畢竟寒多於熱痢病亦有寒症然畢竟熱多於寒是以泄瀉經久必傷胃陽而腫脹喘滿之變生痢病經久必損其陰而虛煩痿廢之疾起痢病兜澀太早濕熱流注多成痛痹泄瀉疏利或過中虛不復多作脾勞此予所親歷非臆說也或曰熱則清而寒則溫是已均是濕也或從利或從燥何歟曰寒濕者寒從濕生故宜苦溫燥其中濕熱者濕從熱化故宜甘淡利其下且燥性多熱利藥多寒便利則熱亦自去中溫則寒與俱消寒濕必本中虛不可更行滲利濕熱鬱多成毒不宜益以溫燥也溫病風溫溫疫濕溫溫毒溫瘧之異溫病者冬月伏寒化熱至春而發所謂春時陽氣發於冬時伏寒者是也風溫者溫病而兼新風發汗已則風氣去而溫氣發故身灼熱也溫疫者溫氣盛而成癘也濕溫者溫氣而兼濕邪濕能生溫溫亦生濕也溫毒者溫氣發而不能遽散怫鬱成毒猶傷寒之有陽毒陰毒也溫瘧者溫病系在少陽時作時止乍進乍退者也春溫之症輕重不同舊有冬伏之寒邪新感春時之風氣其寒從風而並於外者輕其風從寒而並於內者重矣並於內者治其內毋遺其外並於外者治其外毋外其內若舊伏之寒已變為熱而更感春時之風風熱相激多成風瘧其引之而隨出者輕其發之而轉陷者危矣又有七情飲飽勞倦之人復受六氣風寒暑濕之邪若內就外而甚於外者先治其外而後調其內若外就內而甚於內者先治其內而後調其外王好古云治內兼外者不可寒下若寒下則經邪陷於內矣治外兼內者不可熱發若熱發則益中熱於外矣又曰外重而內輕者先治其外後治其內若積寒傷冷脈已從陰雖有標病不須治標獨治內也內既得溫標病不發而自愈何以然發表之藥不遠熱也故曰陰症治本不治表表本俱得治標不治本標本俱失溫邪之發陰必先傷設有當行解散者必兼滋陰之品於其中昔人於蔥豉湯中加童便於梔豉湯內加地黃麥冬亦此意也溫毒發班與傷寒發斑不同溫毒之邪從內之外傷寒之邪從外入內是以溫毒發斑者邪氣離里而之表其症輕傷寒發斑者邪氣盛於內而見於外其症重盛於內者必使下泄而後者可去華元化所謂須要下之不可留於胃中是也之於外者可從表而出之郭白雲所謂其毒久鬱而發病不在裡故不可下必隨表症治之當用藥解肌熱者是也目赤腫痛目赤腫痛人知降火而不知活血所以多不得力只用四物湯內地黃用生芍藥用赤加酒蒸大黃赤茯苓薄荷葉治之甚妙此戴復庵法余謂目赤腫痛人知活血而不知治痰脾胃壅滯積熱生痰積痰生熱輾轉相因氣衝頭目昏痛不已者須用半夏石菖蒲黃芩枳實茯苓陳皮微兼菊花白蒺藜之屬治之口糜王肯堂治許少薇口糜謂非乾薑不愈卒如其言又從子懋鋙亦患此勢甚危急欲飲冷水與人參白朮乾薑各二錢茯苓甘草各一錢煎成冷飲日數服乃已蓋土溫則火斂人多不能知此所以然者胃虛食少腎水之氣逆而乘之則為寒中脾胃虛衰之火被迫上炎作為口瘡其症飲食少思大便不實或手足逆冷肚腹作痛是也冷勞虛勞之人氣血枯耗生氣不榮則內生寒冷張雞峰所謂冷勞者是也宜建中復脈八味腎氣之屬甘溫辛潤具生陽化陰之能者治之亦有邪氣淹滯經絡瘀郁者元珠所謂體虛之人最易感於邪氣當先和解微利微下之次則調之醫不知而遽行補劑邪氣不解往往致死是故虛勞之治固不必專以補陰降火為事也熱風熱風熱化為風也患人頭目昏眩痛口鼻燥熱氣出微惡風時時有熱者是也是雖辛涼不能解之孟詵云患熱風人宜食牛乳謂其氣味甘寒而性濡潤能使肌熱除而風自熄求之草木蘆根蔗漿梨汁之屬性味相似亦內經風淫於內治以甘寒之旨也食鹹頭汗出一人食鹹頭汗如注食淡則否診之心脈獨大而搏指因問曰燥欲飲乎曰然每晨起舌必有刺因悟所以頭汗出者心火太盛而水不勝之也味鹹屬水而能降火火與水搏火盛水微不能勝之而反外越也其出於頭者水本潤下而火性炎上水為火激反從其化也食淡則否者鹹味湧泄為陰淡味滲泄為陽陽與陽從不相激射故得遂其滲泄之性而下行也雜識醫悟融會群經貫穿百家不為名言高論而義理自著以視誇大其言而不適於用者奚啻霄壤醫讀平易簡要可為中人以下說法要非熟讀群書通曉方藥者不能為此正本書辨論古方銖量權衡甚為詳悉以及唐宋醫局官制醫書本草湯液脈病並有卓見亦好古博雅之士歟韓氏十四藥定經因時和解之法極意分晰而眉目未清絕無準繩而多所裁製逞一己之私意亂先聖之舊章不足為後學法也跋夫治病猶治國也治國者必審往古理亂之事蹟與正治之得失而後斟之以時酌之以勢而後從而因革之治病者必知前哲察病之機宜與治療之方法而後合之氣體辨之方土而從而損益之蓋未有事不師古而有濟於今者亦未有言之無文而能行之遠者予自弱冠即喜博涉醫學自軒岐以迄近代諸書搜覽之下凡有所得或信或疑輒筆諸簡雖所見未廣而日月既多卷帙遂成昔真西山修讀書記謂門人曰此人君為治之門如有用我者執此以往予之是集即西山讀書記之意也執此以往亦可以應變無窮矣飼鶴山人尤怡識附靜香樓醫案三十一條羅氏論虛勞之證都因邪伏血鬱而得不獨陰虧一端也至晚寒熱時減時增其為陽陷入陰可知滋腎生肝最為合法略加損益不必更張可也熟地白芍丹皮茯苓懷藥柴胡鱉甲炙草真陽氣弱不榮於筋則陰縮不固於里則精出不衛於表則汗泄三者每相因而見其病在三陰之樞非後世方法可治古方八味丸專服久服當有驗也眩暈嘔惡胸滿小便短而數口中乾水虧於下風動於上飲積於中病非一端羚羊角鉤藤半夏小生地天麻竹茹廣皮茯苓肝陽化風逆行脾胃之分液聚成痰流走肝膽之絡左體麻痹心膈痞悶所由來也而風火性皆上行故上有火升氣逆鼻衄等症此得之飢飽勞郁積久而成非一朝一夕之故矣治法清肝之火健脾之氣亦非旦夕可圖也羚羊角橘紅白朮枳實天麻半夏茯苓甘草麥冬肺陰不足肺熱有餘咳則涕出肌體惡風是熱從竅泄而氣不外護也他臟雖有病宜先治肺阿膠杏仁貝母北參兜鈴茯苓炙草糯米干嗆無痰是肝氣衝肺非肺本病仍宜治肝兼滋肝氣可也川連白芍烏梅甘草當歸牡蠣茯苓絡脈空隙氣必遊行作痛最慮春末夏初地中陽氣上升血從氣溢趁此綢繆當填精益髓蓋陰虛咳嗽是他臟累及於肺若治以清涼不但病不能去而胃傷食減立成虛損難為力矣海參熟地金櫻膏麋角膠湘蓮肉北味萸肉懷藥茯神芡實即將二膏搗丸陰不足而陽有餘肝善逆而肺多郁脈數氣喘咳逆見血脅痛治宜滋降更宜靜養不爾恐其血逆不已也小生地荊炭白芍童便鬱金小薊藕汁離經之血未淨而鬱於內寒熱之邪交煽而亂其氣是以腹滿嘔泄寒熱口燥治當平其亂氣導其積血元氣雖虛未可驟補也丹皮楂炭澤蘭赤芍鬱金丹參牛膝小薊凡有瘀血之人其陰已傷其氣必逆茲以血紫黑無多而胸中滿悶瘀猶未淨也而舌絳無苔則陰之虧也嘔吐不已則氣之逆也且頭重足冷有下虛上脫之虛惡寒譫語為陽弱氣餒之徵此症補之不投攻之不可殊屬棘手人參茯苓山漆吳萸烏梅牡蠣川連鬱金少陰為陰之樞內司啟閉虛則失其常矣宜以法壯其樞或通或塞皆非其治熟地杞子菟絲茯苓丹皮萸肉懷藥沙苑中氣虛寒得冷即瀉而又火升齒衄等症古人所謂胸中聚集之殘火腹內積久之沉寒此當溫補中氣俾土厚則火自斂人參茯苓白朮炙草乾薑益智仁肺實於上腎虛於下脾困於中之候也然而實不可攻姑治其虛中不可燥姑溫其下且腎為胃關而火為土母或有小補未可知也金匱腎氣丸汗出偏沮脈來不柔時自歇止肝陽有餘而胃陰不足於是稠痰濁火擾動於中壅滯於外目前雖尚安和然古人治未病不治已病知者見微知著自當加意調攝為佳人參川斛南棗半夏茯苓炙草麥冬丹皮小麥表虛易感風邪裡虛易作瀉上虛則眩下虛則夢泄宜玉屏風散黃耆防風白朮茯苓牡蠣炙草臍中時有濕液腥臭按脈素大此少陰有濕熱也六味能除腎間濕熱宜加減治之六味去山藥加川柏萆薢車前女貞下體失血之餘陰氣必傷邪乃乘虛直入陰中挾身中之虛陽而上逆頭熱肢冷咳嗆氣衝至夜尤甚皆其驗也此症邪少虛多下虛上實不與大概時病同法此愚一偏之見也未識高明以為然否生地白芍茯苓麥冬炙草元參瘧發而血上下溢得之中虛而邪復擾之也血去既多瘧邪尚熾中原之擾猶未已也誰能必其血之不復來耶謹按古法中虛血脫之症從無獨任血藥之理而瘧病經久亦必先固中氣茲擬理中一法止血在是止瘧亦在是惟高明裁之人參於朮炮姜炙草心者藏之臟心太勞則神散而心虛心虛則腎氣乘之故恐經所謂厥氣上則恐也是病始因心而及腎繼因腎而心益困矣經云心欲軟腎欲堅心軟則善下故軟之必咸腎堅則不浮堅之者必以苦又云高者抑之散者收之治心腎神志不收者法必本乎此以心為血臟腎為精臟欲神之守必養其血欲志之堅必益其精則甘潤生陰質量味厚之品又足為收神志之地也人參川連懷藥天冬熟地茯神五味牡蠣萸肉柏仁桂心驟驚恐懼手足逆冷少腹氣衝即厥陽縮汗出下元素虧收攝失司宜乎助陽以補納第消渴心悸忽然腹中空洞此風消肝厥非桂附剛劑所宜炒黑杞子舶茴香當歸桂木紫石英白龍骨細辛肝陰素虧風溫擾之發為痙病神昏齘齒瘛瘲不定法當滋養肝陰以榮筋脈清滌痰熱以安神明者也若能應手尚可無慮羚羊角茯神鉤藤川貝真阿膠鮮菖蒲鮮竹瀝風熱上甚頭痛不已如鳥巢高巔宜射而去之制軍犀角川芎細茶此腎厥心痛背脹映及腰中議用許學士香茸丸鹿茸杞子沙苑大茴香麝香欠咳脅痛不能左側病在肝逆在肺得之情志難以驟驅治法不當求肺而當求肝阿膠白芍茯苓丹皮茜草炙草鮑魚湯代水肝臟失調侵脾則痛侮肺則乾咳病從內生非外感客邪之比是宜內和臟氣不當外奪衛氣者也但脈弱而數形瘁色槁上熱下寒根本已漓恐難全愈奈何當歸建中湯風氣乘虛入於腎絡腰中痛引背脅宜寄生湯補虛通絡祛風生地當歸黑豆獨活懷藥杜仲白蒺炙草桑寄生肺之絡會於耳中肺受風火久而不清竅與絡俱為之閉所以鼻塞不聞香臭耳聾耳鳴不聞音聲也茲當清通肺氣蒼耳薄荷桔梗連翹辛夷黃芩山梔杏仁甘草木通風熱久蓄腦髓發為鼻淵五年不愈此壅疾也則宜通不通則不治犀角蒼耳黃芩杏仁川芎鬱金寒熱後邪走手少陰之脈猝然不語肩臂牽引不舒宜以辛通之菖蒲遠志甘草木通當歸丹皮丹參茯伸脾虛生濕氣為之滯血為之不守此與血熱經多者不同焦術澤瀉白芍陳皮炙草茯苓川芎牛角䚡灰胎前病子腫產後四日即大泄泄已一笑而厥不省人事及厥回神清而右脅前後痛滿至今三月餘矣形瘦脈虛食少腹都滿足漸腫小便不利此脾病傳心心不受邪即傳之肝肝受病而更傳之脾也此五臟相賊與六腑食氣水血成脹者不同所發補攻遞進而絕無一效也姑擬泄肝和脾法治之臺術木瓜廣皮椒目茯苓白芍
