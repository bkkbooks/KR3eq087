body:
  text: 卷上陽氣陰氣陽氣者精則養神柔則養筋蓋陽之精如日光明洞達故養神陽之柔如春景和暢故養筋日月之行不違其道樞機之運不離其位陽氣之動不失其所故曰欲如運樞起居如驚神氣乃浮又曰陽氣者若天與日失其所則折壽而不彰陽氣天氣也陰氣地氣也天氣不治則地氣上干矣故曰陽氣者閉塞地氣者冒明雲霧出於地而雨露降於天地氣不治則天氣不化矣故曰雲霧不精則上應白露不下蓋天地陰陽本出一氣陽失則陰不能獨成陰失則陽不能獨化自然之道也人與天地參故肺氣象天病則多及二陰大小腸象地病則多及上竅仲景以大黃甘草湯治食已即吐丹溪用吐法治小便不通豈非有見於此歟四氣春氣少陽初升之氣陽方升而被抑生氣不達則臟氣內敗猶木鬱則腐也故曰逆春氣則少氣不生肝氣內變夏為盛長之氣心為太陽之臟夏氣不長則心氣不充不充則內空若洞也故曰逆夏氣則太陽不長心氣內洞秋氣應收而反泄秋真氣不斂燥反乘之則清肅之化轉為鬱燠之化也故曰逆秋氣則太陰不收肺氣焦滿焦滿猶煩滿也冬氣應藏而不藏則少陰之經氣不歸而腎中之臟氣獨沉左氏所謂亂氣張脈外強中乾是也故曰逆冬氣則少陰不藏腎氣獨沉氣相得則和不相得則病主氣應節候而分布歲以為常者也客氣隨司天而遞遷六期而復始者也而主客加臨有相得不相得之異如子午年初之氣主厥陰風木客太陽寒水二之氣主少陰君火客厥陰風木以水加木以木加火母來生子為相得也三之氣主少陽相火客少陰君火四之氣主太陰濕土客太陰濕土以火遇火以土遇土主客同氣為相得也五之氣主陽明燥金客少陽相火以火加金金畏火制為不相得也六之氣主太陽寒水客陽明燥金以金加水金能生水亦相得也相得則和不相得則病矣其有相得而亦病者如水臨金金臨土土臨火之屬以子臨母以下臨上所謂不當位也故亦病也然須合歲運強弱而論之如甲子年歲土太過三之氣為少陰君火以火加土則土益旺而無制是雖相得而不相和也庚子年歲金太過五之氣少陽相火以火加金金有制而反和是雖不相得而不為病也又如水臨金火臨木之屬設遇金木不及之運則金得水而清木得火而明雖不當位亦不病也水臨土木臨火之屬設遇木火太過之運則土得火而堅火得木而燔雖當位亦病也更有進者太過之土木不能制者金反得而泄之不及之木水不能滋者火反得而養之此天地生成之妙也欲明運氣之理者其可以淺求之耶天符歲會應天為天符承歲為歲直三合為治天謂司天歲謂歲支曰應曰承謂歲運也司天行天之氣歲支行地之氣歲運行氣交之化三者其氣不必皆同而亦有時而同者如戊寅戊申歲戊為火運寅申又為相火是以歲運而同司天之氣謂之天符符者同也同於天也如甲辰甲戌歲甲為土運辰戌又為土是以歲運而同歲支之氣謂之歲直直者值也值其歲也又曰歲會會者合也合於歲也若己丑己未歲歲運之土既同天氣又同歲支謂之太乙天符即經所謂三氣併合為治也夫氣同者其化同其氣異者其化異化同則有相助為虐之害化異則有互相剋賊之憂然以不及之運而得司天歲支之助則不及之氣轉為平氣而氣反治若歲運太過其氣已盛而復得司天歲支之合三氣並治其亢而害物有不可言喻者矣故曰中執法者其病速而危中行令者其病徐而持中貴人者其病暴而死六元正紀素問六元正紀大論分列六十年運氣病治之紀統論六氣司天在泉之政可謂詳且盡矣然而驗之於事合之於時往往不能相符且也一年之間九州之內有東南旱乾而西北淫雨者有西北焦槁而東南大水者則九州分野上應九宮為地氣之不齊也且有宋元豐四年歲在辛酉涸流之紀而河決大水則氣化勝復之異胡源所謂歲水不及侮而乘之者土也土不務德故以濕勝寒時則有泉湧河衍涸流生魚其變為驟注為霖潰名為少羽而實與太宮之歲同者是也是故五運六氣之理不可不知也亦不易知也而況古今度數之有差等天人感召之有休咎執而泥之刻舟而求劍者也廢而棄之亡筌而求者也非沉潛之士而具圓機之智者烏足以誤此靈素不同六節臟象論云心為陽中之太陽肺為陽中之太陰腎為陰中之少陰肝為陽中之少陽而靈樞九針十二原云陽中之少陰肺也陽中之太陽心也陰中之少陽肝也陰中之太陰腎也按素以肝為陽者言其時靈以肝為陰者言其臟也素以肺為太陰腎為少陰者舉其經之名靈以肺為少陰腎為太陰者以肺為陰臟而居陽位腎為陰臟而居陰位也二經之不同如此經脈十二絡脈十五凡二十七氣以上下所出為井所溜為滎所注為腧所過為原所行為經所入為合故本輸篇云膀胱出於至陰為井溜於通谷為滎注於束骨為腧過於京骨為原行於崑崙為經入於委中為合膽出於竅陰為井溜於俠溪注於臨泣為腧過於丘墟為原行於陽輔為經入於陽之陵泉為合胃出於厲兌為井溜於內庭為滎注於陷谷為腧過於衝陽為原行於解溪為經入於下陵為合而根結篇云足太陽根起於至陰溜於京骨注於崑崙入於天柱飛揚足少陽根起於竅陰溜於丘墟注於陽輔入於天容足陽明根起於厲兌溜於衝陽注於下陵入於人迎豐隆是以井滎腧原經合之處即一經所言而亦有不同如此素問傳寫之誤蒼天之氣清淨則志意治順之則陽氣固雖有賊邪弗能害也故聖人傳精神服天氣而通神明按傳當作專言精神專一則清淨弗擾猶蒼天之氣也老子所謂專氣致柔太史公所謂精神專一動合無形瞻足萬物班氏所謂專精神以輔天年者是也若作傳與義難通王注精神可傳惟聖人得道者乃能爾豫未知精神如何則傳也因於寒因於暑二節丹溪重定章句為是脈乍疏乍數者死謂氣亂而失常也又少陽脈至乍數乍疏乍短乍長夫少陽氣即未齊其脈大小不同已耳何至失其常度耳按扁鵲陰陽法云少陽之至乍小乍大乍長乍短大豈好異而云然哉春脈太過則令人善忘忽忽眩冒而巔疾王氏謂忘當作怒是解脈令人腰痛痛而引肩目䀮䀮然時遺溲又云解脈令人腰痛如引帶常如折腰狀善怒詳本篇備舉諸經腰痛乃獨遺帶脈而重出解脈按帶脈起於少腹之側季脅之下環身一周如束帶然則此所謂腰痛如引帶常如折腰狀者自是帶脈為病云解脈者傳寫之誤也血溫身熱者死按溫當作溢夫血寒則凝而不流熱則沸而不寧溫則血之常也身雖熱何遽至死惟血既流溢復見身熱則陽過亢而陰受逼有不盡不已之勢故死今人失血之後轉增身熱咳嗽者往往致死概可見矣立而暑解治其骸關暑解當是骨解言骨散墮如解也骨與暑相似傳寫之誤也診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂故乃可診有過之脈按營衛生會篇云平旦陰盡而陽受氣矣夫陰方盡何云未動陽氣方受何云未散疑是陽氣未動陰氣未散動謂盛之著散謂衰之極也甲乙之誤素問曰陰氣盛於上則下虛下虛則腹脹滿又曰陽氣盛於上則下氣重上而邪氣逆逆則陽氣亂陽氣亂則不知人此二段乃岐伯分答黃帝問厥或令人腹滿或令人昏不知人二語之辭所謂陰氣者下氣也下氣而盛於上則下反無氣矣無氣則不化故腹脹滿也所謂下氣者即陰氣也陽氣上盛則陰氣上奔陰從陽之義也邪氣亦即陰氣以其失正而上奔即為邪氣邪氣亦即陰氣以其失正而上奔即為邪氣邪氣既逆陽氣乃亂氣治則明亂則昏故不知人也甲乙經削陽氣盛於上五字而增腹滿二字於下虛則腹脹滿之下則下氣重上之上林氏云當從甲乙謂未有陰氣盛於上而又陽氣盛於上者二公並未體認分答語辭故其言如此殆所謂習而弗察者耶心脈搏堅而長當病舌卷不能言其軟而散者當消環自己按搏堅而長者太過之脈心象火而脈縈舌心火有餘故病舌卷不能言也軟而散者不足之脈心者生之本神之處心不足則精神為消如卑惵遺亡恐懼之類是也環自己者言經氣以次相傳如環一周復至其本位而氣自復病自已也診要經終論云刺中心者環死義與此同環自已者經盡氣復則生環死者經盡氣絶則死也甲乙經環作渴非推而外之內而不外有心腹積也推而內之外而不內身有熱也下而不上頭項痛也按之至骨脈氣少者腰脊痛而身有痹也甲乙經上而不下作下而不上下而不上作上而不下非蓋上而不下者上盛而下虛下虛則下無氣故腰足冷下而不上者有降而無升不升則上不榮故頭項痛也經文前二段是有餘之病故受病處脈自著後二段是不足之病故當病之處脈反衰按之至骨而脈氣少為腰脊痛而身有痹者亦不足之診也經文虛實互舉深切診要自當從古王注之誤素問曰味過於苦脾氣不濡胃氣乃厚味過於辛經脈沮弛精神乃央注云苦性堅燥又養脾胃故脾氣不濡胃氣強厚辛性潤澤散養於筋故令筋緩脈潤精神長久按經云陰之所生本在五味陰之五宮傷在五味是以五臟資生於味而味過反傷五臟此所謂脾氣不濡胃氣乃厚者由脾不能為胃行其津液而胃亦不能輸其精氣於脾也胃不輸脾不行則津液獨滯於胃而胃乃厚厚猶滯也寧強厚之足言哉沮消沮也弛懈弛也由辛散太過而血氣消沮筋脈懈弛精氣衰及其半也豈潤澤長久之謂哉以過為正以傷為益誤矣誤矣切脈動靜而視精明精明者兩目之精光也注云明堂左右近目之穴非是下文云精明者所以視萬物別黑白審短長然則非目中之精明而何肺脈軟而散者當病灌汗至今不復散發也灌汗者汗出淋漓如以水灌之謂肺氣衰弱故散而不收也至秋肺金司令之時其氣自收其汗自斂而不復散發也非寒水灌洗皮密無汗之謂也胃脈沉鼓澀胃外鼓大心脈小堅急皆鬲偏枯男子發左女子發右不喑舌轉可治三十日起其從者喑三歲死王注云從謂男子發左女子發右也然則經文何必更出其從者三字按玉版論要云男左為逆右為從女子右為逆左為從本文蓋謂男子發左女子發右於法為逆然不喑舌轉則受邪輕故證雖逆而猶可治若男子發右女子發左於法為從然喑則受邪重證雖從必三歲乃起也設逆而邪重者必死不治從而邪微者奚待三歲而後起哉西北之氣散而寒之東南之氣收而溫之蓋西北寒束於外而陽聚於內故宜散而寒東南陽泄於外而陰伏於內故宜收而溫非食冷食熱之謂也心欲軟腎欲堅心欲軟急食鹹以軟之腎欲堅急食苦以堅之蓋心於象為離腎於象為坎坎之明在內以剛健而行之於外故欲堅離之明在外當柔順而養之於中故欲軟軟者必以咸堅者必以苦咸從水化苦從火化也夫坎水潤下愈下則陷矣故以行為尚易曰行有尚吉往有功也離火炎上愈上則焚矣故以蓄為吉易曰離利貞亨畜牝牛吉也然則所以堅之軟之者固欲其水上火上而成心腎交通之妙歟三陽在頭三陰在手三陽外感診在人迎人迎者結喉兩旁動脈故曰三陽在頭三陰內傷診在氣口氣口即寸口也故曰三陰在手脾氣外絶脈浮大虛者是脾氣之外絶去胃外歸陽明也言脾虛氣下不為胃行精氣而與大腸驅糟粕也人有不能食而數便利者非脾去胃歸陽明之故歟勞風勞風法在肺下其為病也強上冥視唾出若涕惡風而振寒治之奈何曰以救俯仰巨陽引精者三日中年者五日不精者七日咳出青黃涕其狀如膿大如彈丸從口中或鼻中出不出則傷肺傷肺則死矣讀此可悟傷風不解成癆之故勞風者既勞而又受風也勞則火起於上而風又乘之風火相搏氣湊於上故云法在肺下也肺主氣而司呼吸風熱在肺其液必結其氣必壅是以俯仰皆不順利故曰當救俯仰也救俯仰者即利肺氣散邪氣之謂乎然邪氣之散與否在平正氣之盛與衰若陽氣旺而精氣引者三日次五日又次七日則青黃之涕從咳而出出則風熱俱去而肺無恙矣設不出則風火留積肺中而肺傷肺傷則喘咳聲嘶漸及五臟而虛勞之病成矣今人治勞日用滋養而不少益者非以邪氣未出之故歟而久留之邪補之固無益清之亦不解虛勞病之所以難治也再按脈解篇云太陽所謂強上引背者陽氣大上而爭故強上也勞風之病火在上而風乘之風火皆陽也風性善行火性炎上非所謂陽氣大上而爭者乎結陽結陰結陽者腫四肢結陰者便血一升再結二升三結三升結陽陽聚而實也四肢者諸陽之本陽實則四肢腫也結陰陰氣凝聚不與陽氣相通也夫陽所以舉陰氣者也陰無陽而獨則不復周流四布有墜而下出耳再結三結謂二陰三陰並結不解結愈甚者下愈多也胃脘癰人病胃脘癰者診當候胃脈其脈當沉細沉細者氣逆逆者人迎甚盛甚盛則熱人迎者胃脈也逆而甚則熱聚於胃口而不行故胃脘為癰也按人迎在頭趺陽在足皆胃脈也云當候胃脈者謂趺陽也趺陽脈不必沉且細而今沉且細者氣逆於上而下乃虛下虛則沉細也人迎甚盛者氣逆於上則上盛上盛故人迎甚盛夫氣聚於上而熱不行胃脘壅遏得不蓄積為癰耶腸覃石瘕覃延也瘜肉蔓延與腸相著瘕假也假血成形積於胞中血積易去故曰可導而下瘜肉漸大則消之非易故曰狀如懷子久者離歲肺消心移寒於肺為肺消肺消者飲一溲二死不治肺居上焦而司氣化肺熱則不肅不肅則水不下肺寒則氣不化不化則水不布不特所飲之水直趨而下且並身中所有之津盡從下趨之勢有降無升生氣乃息故曰飲一溲二死不治四維相代四維四肢也相代相繼為腫也四肢為諸陽所實之處相繼為腫者氣餒而行不齊也故曰陽氣乃竭四肢不舉玉機真臟論云脾脈太過則令人四肢不舉其不及則令人九竅不通靈樞本神篇云脾氣虛則四肢不用實則腹脹涇溲不利蓋脾虛則營衛涸竭不能行其氣於四肢而為之不舉脾實則營衛遏絶亦不能行其氣於四肢而為之不舉九竅亦然兩經互言之者所以窮其變也折髀胃脈搏堅而長其色赤當病折髀胃土太過而火復益之腑陽獨盛臟陰受傷則髀痛如折也水液渾濁水液渾濁有脾經穀氣不化濕熱下流亦有因肺金氣衰而便液停凝蓋肺司州都之氣化中氣不足則溲便為之變未可執其皆屬於熱之一語而施治也厥巨陽主氣故先受邪少陰與其為表裡也得熱則上從之從之則厥也故有風熱小恙而亦面赤足冷者如是則解外之邪必靖內之氣設徒與表藥真陽隨越故曰表裡刺之飲之服湯煎厥煎厥即熱厥也火迫於下氣逆於上為厥逆而熱煩也潰潰乎若壞都汩汩乎不可止者言其精神散敗若土之崩若水之放而不可復收之掩之也氣泄心脈不及則令人煩心上見咳唾下為氣泄氣泄者氣隨便失脾腸之病即氣利也乃火不足而土受病也瘧瘧脈緩大虛調以甘藥凡諸瘧而脈不見刺十指間出血血出必已故初病脈不出者多是氣血壅遏所致無用張皇遽投溫補亦致敗事氣痹精少皆能生寒人身非衣寒也中非有寒氣也寒從中生者何是人多痹氣也又腎者水也而生於骨腎不生則髓不能滿故寒甚至骨也是故氣痹精少皆能生寒不必謂其定責陽虛也刺久病刺久病者深內而久留之間日而復取之必先調其左右去其血脈愚謂此刺道也可通藥之用矣以其病久入深故必深內以其陰氣難得故必久留間日者休其氣也調其左右去其血脈者調其未病之處使血脈流通也以丸藥攻其病以甘藥養其正且進且止毋速其效以平為期藥之道盡矣
